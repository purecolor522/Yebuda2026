# Render.com blueprint — one-click deploy
# 1. Push this repo to GitHub
# 2. On https://render.com → New → Blueprint → select this repo
# 3. Render reads this file and provisions the service + persistent disk
# 4. Fill in the env vars marked `sync: false` in the dashboard
#
# Free tier cold-starts after 15 min idle; upgrade to Starter ($7/mo) to keep warm.
services:
  - type: web
    name: yebuda-shop
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false       # set to https://<your-render-url>.onrender.com after first deploy
      - key: ECPAY_ENV
        value: stage      # switch to "production" once merchant approved
      - key: ECPAY_MERCHANT_ID
        value: "3002607"  # ECPay official test merchant
      - key: ECPAY_HASH_KEY
        value: pwFHCqoQZGmho4w6
      - key: ECPAY_HASH_IV
        value: EkRm7iFT261dpevs
    disk:
      name: yebuda-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
