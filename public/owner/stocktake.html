<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庫存盤點 · 老闆專區</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/owner/owner.css">
<style>
  .pdt-row td { padding: 12px; }
  .pdt-img { width: 44px; height: 56px; object-fit: cover; border-radius: 3px; }
  .stock-new { width: 80px; padding: 6px 8px; border: 1px solid #d8d0c0; border-radius: 3px; font-size: 14px; outline: none; text-align: center; }
  .stock-new:focus { border-color: #c9a96e; }
  .stock-new.changed { border-color: #c9a96e; background: #fffbf2; }
  .delta-cell { font-size: 11px; }
  .delta-up { color: #3b7a57; }
  .delta-down { color: #c84436; }
  .low-stock { background: #fff5f5; }
  .grp-row td { background: #faf7f0; border-top: 2px solid #ece4d4; padding: 10px 12px; }
  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .search-row input { flex: 1; }

  .history-card { margin-top: 24px; }
  .history-row td { padding: 10px 12px; font-size: 12px; }
</style>
</head>
<body>
<main class="page">
  <header class="page-head">
    <div>
      <h1>庫存盤點</h1>
      <p class="crumbs">Stocktake · 月底實際盤點後在這裡修正系統庫存</p>
    </div>
  </header>

  <div class="card">
    <h2>商品庫存</h2>
    <div class="search-row">
      <input type="search" id="search" class="inp" placeholder="搜尋商品名稱或 ID...">
      <select id="filter" class="inp">
        <option value="all">全部</option>
        <option value="low">庫存不足 (≤ 5)</option>
        <option value="zero">缺貨 (0)</option>
      </select>
      <button class="btn btn-primary" id="saveAllBtn" disabled>儲存全部變更</button>
    </div>
    <table>
      <thead>
        <tr><th></th><th>商品</th><th class="c">目前庫存</th><th class="c">盤點實數</th><th class="c">差異</th><th>調整原因</th></tr>
      </thead>
      <tbody id="pdtBody"><tr><td colspan="6" class="muted" style="text-align:center;padding:30px;">載入中…</td></tr></tbody>
    </table>
  </div>

  <div class="card history-card">
    <h2>盤點歷史</h2>
    <table>
      <thead>
        <tr><th>時間</th><th>商品</th><th class="c">原本</th><th class="c">調整後</th><th class="c">差異</th><th>原因</th></tr>
      </thead>
      <tbody id="histBody"><tr><td colspan="6" class="muted" style="text-align:center;padding:20px;">載入中…</td></tr></tbody>
    </table>
  </div>
</main>

<script type="module">
import { api, ensureOwner, renderTopBar, toast } from '/owner/js/owner-app.js';
await ensureOwner();
renderTopBar('stocktake');

let products = [];
let history = [];
let filterCat = 'all';
let searchTerm = '';
const changed = new Map(); // key(pid|color|size) → { productId, color, size, newStock, reason }

const vkey = (pid, color, size) => `${pid}|${color}|${size}`;
const esc = s => String(s ?? '').replace(/"/g, '&quot;');

function variantsOf(p) {
  if (Array.isArray(p.variants) && p.variants.length) return p.variants;
  // 後備（理論上遷移後都有 variants）
  const colors = (p.colors && p.colors.length) ? p.colors : (p.color ? [p.color] : ['']);
  const sizes  = (p.sizes && p.sizes.length) ? p.sizes : ['FREE'];
  const out = [];
  for (const c of colors) for (const s of sizes) out.push({ color: c, size: s, qty: 0 });
  return out;
}

async function loadAll() {
  // Use the owner-scoped products endpoint (returns hidden products too) instead
  // of /api/admin/products — owner doesn't have admin cookie, so admin route 401s
  // which would bounce the user back to login.
  [products, history] = await Promise.all([
    api('/api/owner/products'),
    api('/api/owner/stock-adjustments'),
  ]);
  render();
  renderHistory();
}

function render() {
  const tb = document.getElementById('pdtBody');
  let list = products.slice();
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q));
  }
  const rowsHtml = list.map(p => {
    let vs = variantsOf(p);
    if (filterCat === 'low')  vs = vs.filter(v => (v.qty ?? 0) > 0 && (v.qty ?? 0) <= 5);
    if (filterCat === 'zero') vs = vs.filter(v => (v.qty ?? 0) === 0);
    if (!vs.length) return '';
    const head = `<tr class="grp-row"><td><img class="pdt-img" src="${p.image}" alt=""></td>
      <td colspan="5"><strong>${p.name}</strong> <span class="muted" style="font-size:11px;">${p.id}</span> · 總庫存 <strong>${p.stock || 0}</strong></td></tr>`;
    const rows = vs.map(v => {
      const key = vkey(p.id, v.color, v.size);
      const cur = Number(v.qty) || 0;
      const isLow = cur <= 5;
      const pending = changed.get(key);
      const newVal = pending ? pending.newStock : cur;
      const delta = newVal - cur;
      return `<tr class="pdt-row ${isLow ? 'low-stock' : ''}">
        <td></td>
        <td style="padding-left:18px;">
          ${v.color || '—'} <span class="muted">/</span> ${v.size}
          <span style="font-size:11px;color:#8c8274;background:#f4f0e8;padding:2px 6px;border-radius:4px;margin-left:8px;font-family:monospace;">
            ${p.id}-${v.color || 'FREE'}-${v.size}
          </span>
        </td>
        <td class="c" style="font-weight:600;color:${isLow ? '#c84436' : '#333'};">${cur}</td>
        <td class="c"><input type="number" class="stock-new ${pending ? 'changed' : ''}" min="0" value="${newVal}"
            data-key="${esc(key)}" data-pid="${esc(p.id)}" data-color="${esc(v.color)}" data-size="${esc(v.size)}"></td>
        <td class="delta-cell c">${delta === 0 ? '<span class="muted">—</span>' : (delta > 0 ? `<span class="delta-up">+${delta}</span>` : `<span class="delta-down">${delta}</span>`)}</td>
        <td><input type="text" class="inp stock-reason" data-key="${esc(key)}" placeholder="例：月底盤點、損壞..." value="${esc(pending?.reason || '')}" style="width:100%;font-size:12px;padding:6px 8px;"></td>
      </tr>`;
    }).join('');
    return head + rows;
  }).join('');

  tb.innerHTML = rowsHtml ||
    `<tr><td colspan="6" class="muted" style="text-align:center;padding:30px;">沒有符合條件的商品</td></tr>`;

  tb.querySelectorAll('.stock-new').forEach(inp => {
    inp.addEventListener('input', () => {
      const { key, pid, color, size } = inp.dataset;
      const p = products.find(pp => pp.id === pid);
      const v0 = variantsOf(p).find(x => x.color === color && x.size === size);
      const cur = Number(v0?.qty) || 0;
      const val = Math.max(0, Number(inp.value) || 0);
      if (val === cur) changed.delete(key);
      else changed.set(key, { ...(changed.get(key) || {}), productId: pid, color, size, newStock: val });
      render();
      setTimeout(() => tb.querySelector(`.stock-new[data-key="${CSS.escape(key)}"]`)?.focus(), 0);
    });
  });
  tb.querySelectorAll('.stock-reason').forEach(inp => {
    inp.addEventListener('input', () => {
      const existing = changed.get(inp.dataset.key);
      if (!existing) return; // 只在有數量變更時記原因
      existing.reason = inp.value;
    });
  });
  document.getElementById('saveAllBtn').disabled = changed.size === 0;
  document.getElementById('saveAllBtn').textContent = changed.size === 0
    ? '儲存全部變更'
    : `儲存 ${changed.size} 筆變更`;
}

function renderHistory() {
  const tb = document.getElementById('histBody');
  if (!history.length) {
    tb.innerHTML = `<tr><td colspan="6" class="muted" style="text-align:center;padding:20px;">尚無盤點記錄</td></tr>`;
    return;
  }
  tb.innerHTML = history.slice(0, 30).map(h => {
    const d = h.delta;
    const dStr = d === 0 ? '<span class="muted">—</span>' : (d > 0 ? `<span class="delta-up">+${d}</span>` : `<span class="delta-down">${d}</span>`);
    const variant = (h.color || h.size) ? ` <span class="muted" style="font-size:11px;">${[h.color, h.size].filter(Boolean).join('/')}</span> <span style="font-size:10px;color:#8c8274;font-family:monospace;background:#f4f0e8;padding:1px 4px;border-radius:3px;margin-left:4px;">${h.productId}-${h.color || 'FREE'}-${h.size}</span>` : '';
    return `<tr class="history-row">
      <td>${new Date(h.createdAt).toLocaleString('zh-TW', { dateStyle: 'short', timeStyle: 'short' })}</td>
      <td>${h.productName}${variant}</td>
      <td class="c">${h.before}</td>
      <td class="c"><strong>${h.after}</strong></td>
      <td class="c">${dStr}</td>
      <td class="muted">${h.reason || '—'}</td>
    </tr>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });
document.getElementById('filter').addEventListener('change', e => { filterCat = e.target.value; render(); });

document.getElementById('saveAllBtn').addEventListener('click', async () => {
  if (!changed.size) return;
  const entries = [...changed.values()];
  let ok = 0;
  for (const { productId, color, size, newStock, reason } of entries) {
    try {
      await api('/api/owner/stock-adjustments', {
        method: 'POST',
        body: { productId, color, size, newStock, reason: reason || '' },
      });
      ok++;
    } catch (e) { console.error('save failed for', productId, color, size, e); }
  }
  toast(`✓ 已更新 ${ok} 個變體庫存`, 'success');
  changed.clear();
  await loadAll();
});

await loadAll();
</script>
</body>
</html>
