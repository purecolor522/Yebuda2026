<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>損益報表 · 老闆專區</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/owner/owner.css">
<style>
  .range-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .range-tab { padding: 8px 16px; background: #fff; border: 1px solid #d8d0c0; border-radius: 20px; font-size: 12px; letter-spacing: 1px; cursor: pointer; color: #666; }
  .range-tab.active { background: #2c2a26; color: #fff; border-color: #2c2a26; }
  .pl-table { width: 100%; max-width: 480px; margin-top: 14px; }
  .pl-table td { padding: 10px 0; border-bottom: 1px dashed #e6ddd0; }
  .pl-table .label { color: #666; font-size: 13px; }
  .pl-table .val { text-align: right; font-size: 14px; font-weight: 500; font-family: 'Cormorant Garamond', serif; font-size: 18px; }
  .pl-table .total { border-top: 2px solid #2c2a26; border-bottom: none; padding-top: 14px; margin-top: 6px; }
  .pl-table .total td { font-size: 15px; font-weight: 600; color: #2c2a26; }
  .pl-table .total .val { font-size: 22px; color: #3b7a57; }
  .pl-table .neg .val { color: #c84436; }
  .info-box { font-size: 11px; color: #888; margin-top: 18px; line-height: 1.7; padding: 12px; background: #faf7f2; border-left: 3px solid #c9a96e; border-radius: 0 3px 3px 0; }
</style>
</head>
<body>
<main class="page">
  <header class="page-head">
    <div>
      <h1>損益報表</h1>
      <p class="crumbs">Finance · 自動從訂單與進貨資料計算</p>
    </div>
  </header>

  <div class="range-tabs">
    <button class="range-tab active" data-range="last_30d">近 30 天</button>
    <button class="range-tab" data-range="this_month">本月</button>
    <button class="range-tab" data-range="last_month">上月</button>
    <button class="range-tab" data-range="all">全部</button>
  </div>

  <section class="stat-grid">
    <div class="stat"><div class="label">訂單數</div><div class="value" id="sOrders">—</div></div>
    <div class="stat"><div class="label">商品營收</div><div class="value" id="sRevenue">—</div></div>
    <div class="stat green"><div class="label">毛利</div><div class="value" id="sProfit">—</div><div class="delta" id="sMargin"></div></div>
    <div class="stat red"><div class="label">本期進貨</div><div class="value" id="sPurchase">—</div></div>
  </section>

  <div class="card">
    <h2>損益明細</h2>
    <table class="pl-table">
      <tr><td class="label">商品營收（不含運費、未扣折價券）</td><td class="val" id="lRevenue">—</td></tr>
      <tr><td class="label">＋ 運費收入</td><td class="val" id="lShipping">—</td></tr>
      <tr><td class="label">－ 折價券折抵</td><td class="val" id="lCoupon" style="color:#c9a96e">—</td></tr>
      <tr><td class="label" style="font-weight:600;color:#2c2a26;">＝ 實收金額</td><td class="val" id="lTotalIncome" style="color:#2c2a26;">—</td></tr>
      <tr class="neg"><td class="label">－ 銷貨成本 (COGS)</td><td class="val" id="lCogs">—</td></tr>
      <tr class="total"><td class="label">毛利</td><td class="val" id="lProfit">—</td></tr>
    </table>

    <div class="info-box">
      ⓘ <strong>計算說明</strong>：實收 = 商品營收 + 運費 − 折價券。毛利 = 商品營收 − 銷貨成本（按商品的 cost 欄位 × 售出數量計算）。<br>
      ⓘ 「本期進貨」是同段時間實際支出的進貨金額（現金流參考，不影響當期毛利）。要算淨利潤要再扣租金、人事、平台費等其他費用。
    </div>
  </div>

  <div class="card">
    <h2>熱銷排行 (依營收)</h2>
    <table>
      <thead><tr><th>商品</th><th class="c">售出</th><th class="r">營收</th><th class="r">成本</th><th class="r">毛利</th><th class="r">毛利率</th></tr></thead>
      <tbody id="bestSellers"><tr><td colspan="6" class="muted" style="text-align:center;padding:30px;">載入中…</td></tr></tbody>
    </table>
  </div>
</main>

<script type="module">
import { api, TWD, ensureOwner, renderTopBar, toast } from '/owner/js/owner-app.js';
await ensureOwner();
renderTopBar('finance');

let currentRange = 'last_30d';

async function load() {
  try {
    const fin = await api(`/api/owner/finance?range=${currentRange}`);
    // Stats
    document.getElementById('sOrders').textContent   = String(fin.orderCount);
    document.getElementById('sRevenue').textContent  = TWD(fin.revenue);
    document.getElementById('sProfit').textContent   = TWD(fin.grossProfit);
    document.getElementById('sMargin').textContent   = fin.revenue > 0 ? `毛利率 ${fin.grossMargin}%` : '';
    document.getElementById('sPurchase').textContent = TWD(fin.purchaseCostInRange);
    // P&L breakdown
    document.getElementById('lRevenue').textContent  = TWD(fin.revenue);
    document.getElementById('lShipping').textContent = TWD(fin.shippingIncome);
    document.getElementById('lCoupon').textContent   = '− ' + TWD(fin.couponDiscount);
    document.getElementById('lTotalIncome').textContent = TWD(fin.totalIncome);
    document.getElementById('lCogs').textContent     = '− ' + TWD(fin.cogs);
    document.getElementById('lProfit').textContent   = TWD(fin.grossProfit);
    // Best sellers
    const tb = document.getElementById('bestSellers');
    if (!fin.bestSellers?.length) {
      tb.innerHTML = `<tr><td colspan="6" class="muted" style="text-align:center;padding:30px;">這段時間沒有已付款的訂單</td></tr>`;
    } else {
      tb.innerHTML = fin.bestSellers.map(b => {
        const profit = b.revenue - b.cost;
        const margin = b.revenue > 0 ? ((profit / b.revenue) * 100).toFixed(1) : 0;
        return `<tr>
          <td>${b.name}</td>
          <td class="c">${b.qty}</td>
          <td class="r">${TWD(b.revenue)}</td>
          <td class="r muted">${TWD(b.cost)}</td>
          <td class="r" style="color:${profit>0?'#3b7a57':'#c84436'};font-weight:600;">${TWD(profit)}</td>
          <td class="r muted">${margin}%</td>
        </tr>`;
      }).join('');
    }
  } catch (e) { toast(e.message, 'error'); }
}

document.querySelectorAll('.range-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    load();
  });
});

await load();
</script>
</body>
</html>
