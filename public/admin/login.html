<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台登入 · YEBUDA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-body">
<main class="login-card">
  <div class="brand-mark">YEBUDA</div>
  <div class="brand-sub">ADMIN · SEOUL · EST. 2022</div>
  <h1>後台登入</h1>
  <form id="f" autocomplete="on">
    <label>管理員密碼</label>
    <div class="pw-wrap">
      <input type="password" name="password" id="pw" required autofocus>
      <button type="button" class="pw-toggle" id="pwToggle" aria-label="顯示/隱藏密碼" tabindex="-1">
        <svg id="eyeOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="eyeClosed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.7 19.7 0 0 1 4.18-5.43"/><path d="M22.54 14.88A19.43 19.43 0 0 0 23 12s-4-8-11-8a11 11 0 0 0-3.06.44"/><path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <button type="submit">登入 · SIGN IN</button>
    <div id="err" class="err"></div>
  </form>
  <p class="hint">員工專用</p>
  <a href="/" class="back">← 返回前台</a>
</main>
<style>
  /* 比 .login-card button 高的 specificity，避免被全局登入鈕樣式蓋掉 */
  .login-card .pw-wrap { position:relative; }
  .login-card .pw-wrap input { padding-right:46px !important; width:100%; }
  .login-card .pw-toggle {
    position:absolute !important;
    right:8px !important;
    top:50% !important;
    transform:translateY(-50%) !important;
    width:32px !important;
    height:32px !important;
    min-height:32px !important;
    padding:0 !important;
    margin:0 !important;
    background:transparent !important;
    border:none !important;
    color:#999 !important;
    cursor:pointer;
    display:flex !important;
    align-items:center;
    justify-content:center;
    border-radius:4px !important;
    box-shadow:none !important;
    font-size:0 !important;
    letter-spacing:0 !important;
  }
  .login-card .pw-toggle:hover {
    color:var(--brand-dark, #c9a96e) !important;
    background:rgba(0,0,0,0.04) !important;
  }
</style>
<script>
// Eye toggle
document.getElementById('pwToggle').addEventListener('click', () => {
  const inp = document.getElementById('pw');
  const open = document.getElementById('eyeOpen');
  const closed = document.getElementById('eyeClosed');
  if (inp.type === 'password') {
    inp.type = 'text';
    open.style.display = 'none';
    closed.style.display = 'block';
  } else {
    inp.type = 'password';
    open.style.display = 'block';
    closed.style.display = 'none';
  }
});

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: fd.get('password') })
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || '登入失敗');
    }
    location.href = '/admin/';
  } catch (err) { errEl.textContent = err.message; }
});
</script>
</body>
</html>
