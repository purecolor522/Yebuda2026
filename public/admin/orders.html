<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單管理 · YEBUDA Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
<div id="shell"></div>
<main class="page">
  <header class="page-head">
    <div>
      <h1>訂單管理</h1>
      <p class="crumbs">Orders · <span id="count">0</span> 筆</p>
    </div>
    <div class="head-actions">
      <select id="filter-status" class="inp-select">
        <option value="all">全部狀態</option>
        <option value="paid">已付款</option>
        <option value="awaiting_payment">待付款</option>
        <option value="shipped">已出貨</option>
        <option value="payment_failed">付款失敗</option>
        <option value="cancelled">已取消</option>
      </select>
    </div>
  </header>

  <section id="orders-list"></section>
</main>
<script type="module" src="/admin/js/admin-app.js"></script>
<script type="module" src="/admin/js/orders.js"></script>
</body>
</html>
