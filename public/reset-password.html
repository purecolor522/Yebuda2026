<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重設密碼 · YEBUDA 漂亮小姐</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); padding:20px; }
  .reset-card { background:#fff; max-width:420px; width:100%; padding:40px 32px; border-radius:8px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
  .reset-card h1 { font-family:var(--font-serif); font-size:24px; letter-spacing:3px; margin-bottom:6px; text-align:center; }
  .reset-card p.sub { color:#999; font-size:12px; letter-spacing:2px; text-align:center; margin-bottom:28px; }
  .reset-card label { display:block; font-size:13px; color:#555; margin-bottom:6px; }
  .reset-card input { width:100%; padding:12px; border:1px solid var(--border); outline:none; font-family:inherit; font-size:13px; margin-bottom:14px; }
  .reset-card input:focus { border-color:var(--accent); }
  .reset-card .err { color:#e44; font-size:12px; margin-bottom:10px; min-height:16px; }
  .reset-card .ok { background:#f0fff4; border:1px solid #3b7a57; color:#3b7a57; padding:14px; border-radius:6px; font-size:13px; line-height:1.7; text-align:center; margin-bottom:16px; }
  .reset-card button { width:100%; padding:14px; background:var(--text); color:#fff; border:none; cursor:pointer; font-size:13px; letter-spacing:2px; border-radius:4px; transition:var(--transition); }
  .reset-card button:hover { background:var(--accent); }
  .reset-card button:disabled { opacity:0.5; cursor:not-allowed; }
  .reset-card .back { display:block; text-align:center; margin-top:18px; font-size:12px; color:#999; text-decoration:underline; }
  .reset-card .back:hover { color:var(--accent); }
</style>
</head>
<body>

<div class="reset-card">
  <h1>YEBUDA</h1>
  <p class="sub">RESET PASSWORD · 重設密碼</p>

  <div id="successBox" class="ok" style="display:none;">
    ✓ 密碼已成功更新<br>
    <span style="font-size:11px;color:#666;">3 秒後自動回到首頁，請使用新密碼登入</span>
  </div>

  <form id="resetForm">
    <div class="err" id="errMsg"></div>

    <label>新密碼（至少 8 個字元）</label>
    <input type="password" id="newPassword" autocomplete="new-password" minlength="8" required placeholder="••••••••">

    <label>再次輸入新密碼</label>
    <input type="password" id="confirmPassword" autocomplete="new-password" minlength="8" required placeholder="••••••••">

    <button type="submit" id="submitBtn">設定新密碼</button>
  </form>

  <a href="/" class="back">← 返回 YEBUDA 首頁</a>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
const errEl = document.getElementById('errMsg');

if (!token) {
  errEl.textContent = '⚠ 連結缺少必要參數，請重新從信件中點擊';
  document.getElementById('submitBtn').disabled = true;
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  const pw1 = document.getElementById('newPassword').value;
  const pw2 = document.getElementById('confirmPassword').value;
  if (pw1.length < 8) { errEl.textContent = '密碼至少需要 8 個字元'; return; }
  if (pw1 !== pw2)    { errEl.textContent = '兩次輸入的密碼不一致'; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '處理中…';
  try {
    const res = await fetch('/api/auth/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: pw1 }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '重設失敗');
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
    setTimeout(() => location.href = '/', 3000);
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false;
    btn.textContent = '設定新密碼';
  }
});
</script>
</body>
</html>
