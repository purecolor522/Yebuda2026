<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結帳 · YEBUDA 漂亮小姐</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { background: var(--bg); }
  /* Header */
  .ck-header { background: #fff; border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; }
  .ck-header a.brand { font-family: var(--font-serif); font-size: 22px; letter-spacing: 3px; color: var(--text); }
  .ck-header a.brand small { display: block; font-family: var(--font-main); font-size: 9px; letter-spacing: 3px; color: var(--text-light); margin-top: -2px; }
  .ck-header .steps { font-size: 12px; color: var(--text-light); letter-spacing: 2px; }
  .ck-header .steps strong { color: var(--accent); }
  .ck-header .back { font-size: 12px; color: var(--text-light); letter-spacing: 1px; }
  .ck-header .back:hover { color: var(--accent); }

  /* Page layout */
  .ck-page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; display: grid; grid-template-columns: 1fr 380px; gap: 36px; }
  @media (max-width: 880px) { .ck-page { grid-template-columns: 1fr; gap: 22px; padding: 22px 14px 40px; } }

  /* Section card */
  .ck-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 24px 28px; margin-bottom: 18px; }
  .ck-card h2 { font-size: 14px; letter-spacing: 2.5px; font-weight: 600; color: #333; padding-bottom: 10px; border-bottom: 2px solid var(--text); display: inline-block; margin-bottom: 18px; }
  @media (max-width: 880px) { .ck-card { padding: 18px 18px; } }

  /* Inputs */
  .ck-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ck-row.full { grid-template-columns: 1fr; }
  @media (max-width: 540px) { .ck-row { grid-template-columns: 1fr; } }
  .ck-field { margin-bottom: 14px; }
  .ck-field label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; }
  .ck-field .req { color: #e44; }
  .ck-field input, .ck-field select, .ck-field textarea {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border);
    background: #fff; font-family: inherit; font-size: 14px; outline: none;
    border-radius: 4px; transition: border-color 0.15s;
  }
  .ck-field input:focus, .ck-field select:focus { border-color: var(--accent); }

  /* Method cards */
  .method-grid { display: flex; flex-direction: column; gap: 8px; }
  .method-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--border); background: #fff; border-radius: 6px; cursor: pointer; transition: var(--transition); }
  .method-card input { margin: 0; }
  .method-card .mc-title { font-size: 14px; font-weight: 500; }
  .method-card .mc-sub { font-size: 11px; color: #999; margin-top: 3px; }
  .method-card:has(input:checked) { border-color: var(--accent); background: var(--bg); }

  /* CVS pick block */
  #cvsBlock { display: none; }
  .pick-store-btn { width: 100%; padding: 14px; border: 2px solid var(--accent); background: #fff; color: var(--accent); cursor: pointer; font-size: 14px; font-weight: 600; border-radius: 6px; }
  .cvs-selected { display: none; margin-top: 12px; padding: 14px; background: #f0fff4; border: 1px solid #3b7a57; border-radius: 6px; font-size: 13px; }

  /* Address block */
  #addressBlock { display: block; }

  /* Recipient block */
  .same-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #555; cursor: pointer; }

  /* Summary (right column) */
  .ck-summary { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 22px 24px; position: sticky; top: 24px; align-self: start; }
  @media (max-width: 880px) { .ck-summary { position: static; } }
  .ck-summary h2 { font-size: 14px; letter-spacing: 2.5px; font-weight: 600; color: #333; padding-bottom: 10px; border-bottom: 2px solid var(--text); margin-bottom: 16px; }
  .sum-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f5f0e8; }
  .sum-item:last-child { border-bottom: none; }
  .sum-item img { width: 54px; height: 70px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .sum-item .si-info { flex: 1; font-size: 12px; min-width: 0; }
  .sum-item .si-info h4 { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
  .sum-item .si-info small { color: #999; font-size: 11px; }
  .sum-item .si-price { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .sum-line { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: #555; }
  .sum-line.discount { color: var(--accent); }
  .sum-line.total {
    border-top: 2px solid var(--text); margin-top: 10px; padding-top: 14px;
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .sum-line.total span:last-child { color: var(--text); font-family: var(--font-serif); font-size: 22px; }
  .ck-submit {
    width: 100%; padding: 16px; background: var(--text); color: #fff; border: none;
    cursor: pointer; font-size: 14px; letter-spacing: 3px; border-radius: 4px;
    margin-top: 16px; transition: var(--transition);
  }
  .ck-submit:hover:not(:disabled) { background: var(--accent); }
  .ck-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .ck-err { color: #e44; font-size: 12px; margin-top: 10px; display: none; }

  .empty-cart { text-align: center; padding: 80px 20px; color: #999; }
  .empty-cart a { color: var(--accent); text-decoration: underline; }

  /* Auto-fill chip */
  .autofill-chip {
    display: inline-block; margin-bottom: 14px; padding: 8px 14px; background: var(--bg);
    border: 1px solid var(--accent); color: var(--accent); font-size: 12px; cursor: pointer;
    border-radius: 4px; letter-spacing: 1px;
  }
  .autofill-chip:hover { background: var(--accent); color: #fff; }

  /* CVS iframe overlay */
  #cvsMapOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 5000; }
  #cvsMapOverlay .frame-card { position: absolute; inset: max(env(safe-area-inset-top), 12px) 8px max(env(safe-area-inset-bottom), 12px) 8px; background: #fff; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  #cvsMapOverlay .frame-bar { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  #cvsMapOverlay button { background: none; border: none; cursor: pointer; }
</style>
</head>
<body>

<header class="ck-header">
  <a href="/" class="brand">YEBUDA<small>漂亮小姐</small></a>
  <div class="steps">購物車 · <strong>結帳</strong> · 完成</div>
  <a href="/" class="back">← 繼續購物</a>
</header>

<main class="ck-page" id="ckPage">
  <!-- LEFT: form -->
  <form id="checkoutForm" novalidate>

    <!-- 訂購人 -->
    <section class="ck-card">
      <h2>訂購人資料</h2>
      <button type="button" id="autofillBtn" class="autofill-chip" style="display:none">✨ 帶入我的會員資料</button>
      <div class="ck-row">
        <div class="ck-field"><label>姓名 <span class="req">*</span></label>
          <input type="text" id="buyerName" required placeholder="王大明"></div>
        <div class="ck-field"><label>電話 <span class="req">*</span></label>
          <input type="tel" id="buyerPhone" required placeholder="0912345678"></div>
      </div>
      <div class="ck-row full">
        <div class="ck-field"><label>Email <span class="req">*</span></label>
          <input type="email" id="buyerEmail" required placeholder="example@gmail.com"></div>
      </div>
    </section>

    <!-- 取貨方式 -->
    <section class="ck-card">
      <h2>取貨方式 <span class="req">*</span></h2>
      <div class="method-grid">
        <label class="method-card">
          <input type="radio" name="shippingMethod" value="address" checked>
          <div><div class="mc-title">🏠 宅配到府</div><div class="mc-sub">黑貓宅急便 · 滿 NT$3,000 免運</div></div>
        </label>
        <label class="method-card">
          <input type="radio" name="shippingMethod" value="cvs-711">
          <div><div class="mc-title" style="color:#e63946">🟧 7-ELEVEN 取貨</div><div class="mc-sub">至 7-11 門市自取 · 滿 NT$2,000 免運</div></div>
        </label>
        <label class="method-card">
          <input type="radio" name="shippingMethod" value="cvs-fami">
          <div><div class="mc-title" style="color:#00a651">🟩 全家取貨</div><div class="mc-sub">至全家門市自取 · 滿 NT$2,000 免運</div></div>
        </label>
      </div>
    </section>

    <!-- 收貨人 -->
    <section class="ck-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="margin-bottom:0;">收貨人資料</h2>
        <label class="same-toggle"><input type="checkbox" id="sameAsPurchaser" checked> 同訂購人</label>
      </div>
      <div id="recipientFields" style="display:none;">
        <div class="ck-row">
          <div class="ck-field"><label>收貨人姓名 <span class="req">*</span></label>
            <input type="text" id="rcpName" placeholder="王大明"></div>
          <div class="ck-field"><label>收貨人電話 <span class="req">*</span></label>
            <input type="tel" id="rcpPhone" placeholder="0912345678"></div>
        </div>
      </div>

      <!-- 宅配地址 -->
      <div id="addressBlock" class="ck-field">
        <label>收件地址 <span class="req">*</span></label>
        <input type="text" id="buyerAddress" placeholder="台北市信義區忠孝東路五段 100 號">
      </div>

      <!-- 超商取貨 -->
      <div id="cvsBlock" class="ck-field">
        <label>取貨門市 <span class="req">*</span></label>
        <button type="button" class="pick-store-btn" id="pickStoreBtn">
          <span id="pickStoreLabel">點擊選擇門市</span>
        </button>
        <div class="cvs-selected" id="cvsSelected">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;">
            <strong style="color:#3b7a57">✓ <span id="cvsSelBrand"></span> <span id="cvsSelName"></span></strong>
            <a href="#" id="cvsChangeBtn" style="font-size:12px;color:var(--accent);text-decoration:underline;white-space:nowrap;">更換門市</a>
          </div>
          <p id="cvsSelAddr" style="color:#666;font-size:12px;line-height:1.5;margin:0;"></p>
        </div>
        <input type="hidden" id="cvsBrand">
        <input type="hidden" id="cvsStore">
        <input type="hidden" id="cvsStoreId">
        <input type="hidden" id="cvsStoreAddress">
        <p style="font-size:11px;color:#999;margin-top:8px;line-height:1.5;">ⓘ 開啟綠界官方門市地圖，選好門市自動帶回</p>
      </div>
    </section>

    <!-- 付款方式 -->
    <section class="ck-card">
      <h2>付款方式 <span class="req">*</span></h2>
      <div class="method-grid">
        <label class="method-card">
          <input type="radio" name="paymentMethod" value="ecpay" checked>
          <div><div class="mc-title">💳 信用卡</div><div class="mc-sub">綠界 ECPay · Visa / MasterCard / JCB · 即時付款</div></div>
        </label>
        <label class="method-card" id="payCvsCodLabel" style="display:none;">
          <input type="radio" name="paymentMethod" value="cvs-cod">
          <div><div class="mc-title">🏪 超商取貨付款</div><div class="mc-sub">取貨時於門市付現金</div></div>
        </label>
      </div>
    </section>

    <!-- 折價券 -->
    <section class="ck-card" id="couponCard" style="display:none;">
      <h2>🎁 折價券</h2>
      <select id="couponSelect" class="ck-field" style="margin-bottom:0;">
        <option value="">不使用折價券</option>
      </select>
    </section>

  </form>

  <!-- RIGHT: order summary -->
  <aside class="ck-summary" id="ckSummary">
    <h2>訂單摘要</h2>
    <div id="summaryItems"></div>
    <div class="sum-line"><span>商品小計</span><span id="csSubtotal">NT$0</span></div>
    <div class="sum-line"><span>運費</span><span id="csShipping">—</span></div>
    <div class="sum-line discount" id="csCouponLine" style="display:none;"><span id="csCouponLabel">折價券</span><span id="csCouponAmount">−NT$0</span></div>
    <div class="sum-line total"><span>應付總計</span><span id="csTotal">NT$0</span></div>
    <button type="submit" form="checkoutForm" class="ck-submit" id="submitBtn">確認下單 · PLACE ORDER</button>
    <p class="ck-err" id="errMsg"></p>
    <p style="font-size:11px;color:#999;letter-spacing:1px;margin-top:14px;text-align:center;">按下即同意 YEBUDA 服務條款</p>
  </aside>
</main>

<!-- CVS map overlay -->
<div id="cvsMapOverlay">
  <div class="frame-card">
    <div class="frame-bar">
      <strong id="cvsMapTitle" style="font-size:14px;letter-spacing:1px;">選擇門市</strong>
      <button type="button" id="cvsMapClose" style="font-size:22px;color:#999;padding:4px 10px;">✕</button>
    </div>
    <iframe id="cvsMapFrame" src="" style="flex:1;border:none;width:100%;"></iframe>
  </div>
</div>

<script src="/js/checkout-page.js"></script>
</body>
</html>
